<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정수기 포지셔닝 맵</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f4f3ef; color: #1c1b18; font-size: 13px; }

.hd { padding: 16px 24px 10px; background: #fff; border-bottom: 1px solid #e2e0d8; }
.hd h1 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.hd p  { font-size: 11px; color: #999; }

.fbar { padding: 9px 24px; background: #fff; border-bottom: 1px solid #e2e0d8; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
.fg { display: flex; flex-direction: column; gap: 3px; }
.fg-lbl { font-size: 9px; font-weight: 700; color: #bbb; letter-spacing: .07em; text-transform: uppercase; }
.fg-row { display: flex; gap: 4px; flex-wrap: wrap; }
.fb { padding: 3px 9px; border-radius: 4px; border: 1.5px solid #d4d2ca; background: #fff; font-size: 11px; font-weight: 500; cursor: pointer; color: #444; transition: all .12s; font-family: inherit; }
.fb:hover { border-color: #888; }
.fb.on { color: #fff !important; border-color: transparent !important; }

/* 레이아웃 */
.body-wrap { display: flex; min-height: 400px; }

/* 맵 */
.map-area { flex: 1; min-width: 0; padding: 16px 20px 4px; overflow-x: auto; }
.map-inner { min-width: 620px; }

/* X 헤더 */
.x-header { display: flex; margin-left: 108px; gap: 3px; padding-bottom: 5px; }
.x-hcell { flex: 1; text-align: center; font-size: 10px; font-weight: 600; color: #777; padding: 2px; border-bottom: 2px solid #ccc9bf; }
.x-hcell.lg { color: #9b8fcc; border-bottom-color: #9b8fcc; }
.x-main { text-align: center; font-size: 11px; color: #888; padding: 6px 0 12px; }

/* 행 */
.cat-row { display: flex; align-items: stretch; margin-bottom: 4px; }
.cat-lbl {
  width: 108px; flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: flex-end;
  padding: 5px 9px 5px 4px; gap: 2px;
  cursor: pointer; border-radius: 6px; transition: background .12s;
}
.cat-lbl:hover { background: rgba(0,0,0,.05); }
.cat-lbl.on { background: #1c1b18; }
.cat-lbl .ico { font-size: 14px; }
.cat-lbl .nm  { font-size: 10px; font-weight: 700; color: #333; text-align: right; line-height: 1.3; }
.cat-lbl.on .nm { color: #fff; }
.cat-lbl .sub { font-size: 8.5px; color: #bbb; text-align: right; }
.cat-lbl.on .sub { color: rgba(255,255,255,.45); }

.tier-cells { display: flex; flex: 1; gap: 3px; }

/* 셀 */
.cell {
  flex: 1; border-radius: 7px; background: #eceae4;
  padding: 5px 5px 6px; display: flex; flex-direction: column; gap: 2px; min-height: 50px;
}
.cell.empty { background: transparent; }
.cell-cnt { font-size: 8.5px; font-weight: 700; color: #999; margin-bottom: 2px; }

/* 제품 카드 */
.pcard {
  border-radius: 5px; padding: 3px 7px; cursor: pointer;
  border: none; font-family: inherit; text-align: left;
  transition: opacity .1s, transform .1s;
  margin-bottom: 2px; width: 100%;
}
.pcard:hover { opacity: .82; transform: translateX(1px); }
.pcard .brand-row {
  font-size: 8.5px; font-weight: 700; color: rgba(255,255,255,.7);
  margin-bottom: 1px; letter-spacing: .01em;
}
.pcard .prod-name {
  font-size: 10px; font-weight: 600; color: #fff;
  line-height: 1.3; word-break: keep-all;
}
.pcard .prod-price {
  font-size: 8.5px; color: rgba(255,255,255,.75); margin-top: 1px;
}

/* 사이드 패널 */
.side { width: 0; overflow: hidden; transition: width .2s ease; background: #fff; border-left: 1px solid #e2e0d8; flex-shrink: 0; }
.side.on { width: 300px; }
.side-inner { width: 300px; padding: 18px 18px 32px; overflow-y: auto; max-height: calc(100vh - 130px); }
.side-x { float: right; font-size: 18px; cursor: pointer; background: none; border: none; color: #bbb; font-family: inherit; line-height: 1; margin: -3px -3px 0 0; }
.side-x:hover { color: #333; }

/* 패널 — 카테고리 뷰 */
.cat-head { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.basis-box { background: #f4f3ef; border-radius: 7px; padding: 9px 11px; margin-bottom: 12px; }
.basis-lbl { font-size: 9px; font-weight: 700; color: #aaa; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
.basis-txt { font-size: 11px; color: #444; line-height: 1.65; }
.crit { font-size: 10.5px; color: #555; margin-bottom: 3px; line-height: 1.5; }
.crit b { color: #1c1b18; }
.divider { height: 1px; background: #e8e6de; margin: 12px 0; }
.sec-lbl { font-size: 9px; font-weight: 700; color: #bbb; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }

.brand-block { margin-bottom: 12px; }
.brand-hd { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.brand-nm { font-size: 11.5px; font-weight: 700; }
.brand-ct { font-size: 10px; color: #999; }
.tier-grp { margin-bottom: 6px; }
.tier-badge { font-size: 8.5px; font-weight: 700; color: #888; background: #f0ede6; border-radius: 3px; padding: 1px 6px; display: inline-block; margin-bottom: 3px; }
.prod-li { font-size: 10.5px; color: #333; padding: 1.5px 0 1.5px 8px; line-height: 1.4; cursor: pointer; border-radius: 3px; }
.prod-li:hover { background: #f0ede6; }
.prod-li::before { content: '·'; margin-right: 5px; color: #ccc; }

/* 패널 — 제품 상세 뷰 */
.prod-detail .back-btn {
  font-size: 11px; color: #888; cursor: pointer; background: none; border: none;
  font-family: inherit; padding: 0; margin-bottom: 12px; display: flex; align-items: center; gap: 4px;
}
.prod-detail .back-btn:hover { color: #333; }
.prod-detail .pd-brand { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.prod-detail .pd-name { font-size: 15px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
.pd-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0ede6; font-size: 11px; }
.pd-k { color: #888; }
.pd-v { font-weight: 600; text-align: right; }

/* 범례 */
.legend { display: flex; flex-wrap: wrap; gap: 5px 14px; padding: 10px 24px 16px; border-top: 1px solid #e2e0d8; background: #fff; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.li-dot { width: 9px; height: 9px; border-radius: 50%; }

/* 팝오버 */
.popover {
  position: fixed; z-index: 800;
  background: #fff; border-radius: 10px;
  padding: 14px 16px; width: 260px;
  box-shadow: 0 4px 24px rgba(0,0,0,.14), 0 0 0 1px rgba(0,0,0,.06);
  pointer-events: none;
  opacity: 0; transition: opacity .15s;
}
.popover.show { opacity: 1; pointer-events: auto; }
.pop-brand { font-size: 10px; font-weight: 700; margin-bottom: 3px; }
.pop-name { font-size: 14px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
.pop-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f0ede6; font-size: 11px; }
.pop-row:last-child { border: none; }
.pop-k { color: #999; }
.pop-v { font-weight: 600; text-align: right; }
</style>

const ALL_BRANDS = Object.keys(BC);
const TIER_FILTER_ALL = { id:'all', label:'전체' };
const TIER_FILTERS = [TIER_FILTER_ALL, ...TIERS];

let activeBrands = new Set(ALL_BRANDS);
let activeTier = 'all';
let openCat = null;

// 필터
(function(){
  const bb=document.getElementById('bBtns'), pb=document.getElementById('pBtns');
  function mk(label,fn,col,id){
    const b=document.createElement('button');
    b.className='fb';b.textContent=label;b.dataset.id=id;b._col=col;
    b.addEventListener('click',fn);return b;
  }
  bb.appendChild(mk('전체',()=>{activeBrands=new Set(ALL_BRANDS);sB();render();},'#333','__all__'));
  ALL_BRANDS.forEach(br=>bb.appendChild(mk(br,()=>{
    if(activeBrands.size===ALL_BRANDS.length) activeBrands=new Set();
    activeBrands.has(br)?activeBrands.delete(br):activeBrands.add(br);
    if(!activeBrands.size) activeBrands=new Set(ALL_BRANDS);
    sB();render();
  },BC[br],br)));
  TIER_FILTERS.forEach(t=>pb.appendChild(mk(t.label,()=>{activeTier=t.id;sP();render();},'#555',t.id)));
  sB();sP();
})();
function sB(){
  document.querySelectorAll('#bBtns .fb').forEach(b=>{
    const id=b.dataset.id,on=id==='__all__'?activeBrands.size===ALL_BRANDS.length:activeBrands.has(id);
    b.classList.toggle('on',on);b.style.background=on?b._col:'';b.style.color=on?'#fff':'';b.style.borderColor=on?'transparent':'';
  });
}
function sP(){
  document.querySelectorAll('#pBtns .fb').forEach(b=>{
    const on=b.dataset.id===activeTier;
    b.classList.toggle('on',on);b.style.background=on?'#444':'';b.style.color=on?'#fff':'';b.style.borderColor=on?'transparent':'';
  });
}

function getVisible(){
  return PRODUCTS.filter(p=>{
    if(!activeBrands.has(p.brand)) return false;
    if(activeTier!=='all'&&p.tier!==activeTier) return false;
    return true;
  });
}

let popTimer=null;
const pop=document.getElementById('popover');

function showPopover(prod, triggerEl){
  clearTimeout(popTimer);
  const rect=triggerEl.getBoundingClientRect();
  pop.innerHTML=`
    <div class="pop-brand" style="color:${BC[prod.brand]}">${prod.brand}</div>
    <div class="pop-name">${prod.name}</div>
    <div class="pop-row"><span class="pop-k">월 렌탈 할인가</span><span class="pop-v">${prod.rent.toLocaleString()}원</span></div>
    <div class="pop-row"><span class="pop-k">총 비용 추산</span><span class="pop-v">${prod.total}</span></div>
    <div class="pop-row"><span class="pop-k">가격대</span><span class="pop-v">${TIERS.find(t=>t.id===prod.tier).label}</span></div>
    <div class="pop-row"><span class="pop-k">정수 방식</span><span class="pop-v">${prod.purify}</span></div>
    <div class="pop-row"><span class="pop-k">설치 방식</span><span class="pop-v">${prod.install}</span></div>
    <div class="pop-row"><span class="pop-k">얼음 기능</span><span class="pop-v">${prod.ice}</span></div>
    <div class="pop-row"><span class="pop-k">IoT/앱 연동</span><span class="pop-v">${prod.iot}</span></div>`;
  // 위치 계산
  let left=rect.right+8;
  let top=rect.top;
  if(left+268>window.innerWidth) left=rect.left-276;
  if(top+260>window.innerHeight) top=window.innerHeight-268;
  if(top<8) top=8;
  pop.style.left=left+'px';
  pop.style.top=top+'px';
  pop.classList.add('show');
}
function hidePopover(){
  popTimer=setTimeout(()=>pop.classList.remove('show'),120);
}
pop.addEventListener('mouseenter',()=>clearTimeout(popTimer));
pop.addEventListener('mouseleave',()=>hidePopover());

function openCatPanel(catId){
  openCat=catId;
  document.querySelectorAll('.cat-lbl').forEach(el=>el.classList.toggle('on',el.dataset.cat===catId));
  const cat=CATS.find(c=>c.id===catId);
  const inner=document.getElementById('sideInner');
  const vis=getVisible().filter(p=>p.cat===catId);
  // 브랜드별 티어별
  const byBrand={};
  vis.forEach(p=>{
    if(!byBrand[p.brand]) byBrand[p.brand]={};
    if(!byBrand[p.brand][p.tier]) byBrand[p.brand][p.tier]=[];
    byBrand[p.brand][p.tier].push(p);
  });
  let html=`<button class="side-x" onclick="closeCatPanel()">×</button>
    <div class="cat-head"><span>${cat.icon}</span><span>${cat.label}</span></div>
    <div class="basis-box">
      <div class="basis-lbl">분류 기준</div>
      <div class="basis-txt">${cat.basis}</div>
    </div>
    ${cat.criteria.map(c=>`<div class="crit"><b>${c.b}</b> — ${c.t}</div>`).join('')}
    <div class="divider"></div>
    <div class="sec-lbl">포함 제품 (${vis.length}종)</div>`;
  Object.entries(byBrand).forEach(([brand,tmap])=>{
    const tot=Object.values(tmap).flat().length;
    html+=`<div class="brand-block">
      <div class="brand-hd">
        <div class="brand-dot" style="background:${BC[brand]}"></div>
        <div class="brand-nm" style="color:${BC[brand]}">${brand}</div>
        <div class="brand-ct">${tot}종</div>
      </div>`;
    TIERS.forEach(t=>{
      const prods=tmap[t.id];
      if(!prods) return;
      html+=`<div class="tier-grp"><span class="tier-badge">${t.label}</span>
        ${prods.map(p=>`<div class="prod-li" onmouseenter='showPopover(${JSON.stringify(p)},this)' onmouseleave='hidePopover()'>
          ${p.name} <span style="color:#bbb;font-size:9.5px">${p.rent.toLocaleString()}원</span>
        </div>`).join('')}
      </div>`;
    });
    html+=`</div>`;
  });
  inner.innerHTML=html;
  document.getElementById('side').classList.add('on');
}
function closeCatPanel(){
  document.getElementById('side').classList.remove('on');
  document.querySelectorAll('.cat-lbl').forEach(el=>el.classList.remove('on'));
  openCat=null;
}

function render(){
  const xhd=document.getElementById('xHd');
  xhd.innerHTML='';
  const vis=getVisible();
  const activeTiers=activeTier==='all'?TIERS:TIERS.filter(t=>t.id===activeTier);

  activeTiers.forEach(t=>{
    const c=document.createElement('div');
    c.className='x-hcell'+(t.lg?' lg':'');
    c.textContent=t.label;
    xhd.appendChild(c);
  });

  const rows=document.getElementById('rows');
  rows.innerHTML='';

  CATS.forEach(cat=>{
    const row=document.createElement('div');
    row.className='cat-row';
    const lbl=document.createElement('div');
    lbl.className='cat-lbl'+(openCat===cat.id?' on':'');
    lbl.dataset.cat=cat.id;
    lbl.innerHTML=`<span class="ico">${cat.icon}</span><span class="nm">${cat.label}</span><span class="sub">클릭 → 기준/목록</span>`;
    lbl.addEventListener('click',()=>openCat===cat.id?closeCatPanel():openCatPanel(cat.id));
    row.appendChild(lbl);

    const cells=document.createElement('div');
    cells.className='tier-cells';

    activeTiers.forEach(tier=>{
      const cell=document.createElement('div');
      const prods=vis.filter(p=>p.cat===cat.id&&p.tier===tier.id);
      if(!prods.length){
        cell.className='cell empty';
      } else {
        cell.className='cell';
        const cnt=document.createElement('div');
        cnt.className='cell-cnt';
        cnt.textContent=prods.length+'종';
        cell.appendChild(cnt);

        prods.forEach(p=>{
          const card=document.createElement('button');
          card.className='pcard';
          card.style.background=BC[p.brand];
          card.innerHTML=`<div class="brand-row">${p.brand}</div><div class="prod-name">${p.name}</div><div class="prod-price">${p.rent.toLocaleString()}원/월</div>`;
          card.addEventListener('mouseenter',()=>showPopover(p,card));
          card.addEventListener('mouseleave',()=>hidePopover());
          cell.appendChild(card);
        });
      }
      cells.appendChild(cell);
    });

    row.appendChild(cells);
    rows.appendChild(row);
  });

  if(openCat) openCatPanel(openCat);
}

// 범례
(function(){
  const leg=document.getElementById('legend');
  Object.entries(BC).forEach(([br,c])=>{
    leg.innerHTML+=`<div class="li"><div class="li-dot" style="background:${c}"></div><span>${br}</span></div>`;
  });
})();

render();
</script>
