<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: #fafaf8;
  color: #1a1a18;
  padding: 32px 28px 48px;
  min-height: 100vh;
}

h1 { font-size: 21px; font-weight: 500; margin-bottom: 5px; }
.sub { font-size: 13px; color: #888780; margin-bottom: 28px; }

.filter-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px;
}
.filter-btn {
  padding: 5px 14px; border-radius: 20px; border: 1.5px solid #d3d1c7;
  background: #fff; font-size: 12px; cursor: pointer; color: #444441;
  transition: all 0.15s; font-family: inherit;
}
.filter-btn:hover { border-color: #888780; }
.filter-btn.active { color: #fff; border-color: transparent; }

.map-container {
  position: relative;
  width: 100%;
  max-width: 1000px;
}

.plot-wrap {
  position: relative;
  margin: 0 60px 50px 70px;
  height: 580px;
  border-left: 1.5px solid #b4b2a9;
  border-bottom: 1.5px solid #b4b2a9;
}

.y-axis-label {
  position: absolute;
  left: 10px;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
}
.y-axis-label span {
  transform: rotate(-90deg);
  white-space: nowrap;
  font-size: 12px;
  color: #888780;
  font-weight: 500;
  letter-spacing: .02em;
}

.x-axis-label {
  position: absolute;
  bottom: 12px;
  left: 70px;
  right: 60px;
  text-align: center;
  font-size: 12px;
  color: #888780;
  font-weight: 500;
}

.axis-arrow-x {
  display: flex;
  justify-content: space-between;
  position: absolute;
  bottom: 28px;
  left: 70px;
  right: 60px;
  font-size: 11px;
  color: #b4b2a9;
}

.quadrant-label {
  position: absolute;
  font-size: 10.5px;
  color: #c8c6be;
  pointer-events: none;
  font-weight: 400;
  letter-spacing: .01em;
}

.mid-vline {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  border-left: 1px dashed #d3d1c7;
  pointer-events: none;
}
.mid-hline {
  position: absolute;
  left: 0; right: 0;
  top: 45%;
  border-top: 1px dashed #d3d1c7;
  pointer-events: none;
}

.bubble {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.18s, box-shadow 0.18s;
  border-width: 2px;
  border-style: solid;
}
.bubble:hover {
  transform: translate(-50%, -50%) scale(1.12);
  z-index: 10;
}
.bubble-label {
  font-size: 11px;
  font-weight: 500;
  text-align: center;
  line-height: 1.3;
  user-select: none;
  pointer-events: none;
  padding: 2px;
}

.legend-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 24px;
  margin-top: 16px;
  padding: 14px 16px;
  background: #f1efe8;
  border-radius: 10px;
  max-width: 1000px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  color: #444441;
}
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border-width: 2px;
  border-style: solid;
  flex-shrink: 0;
}

.tooltip {
  position: fixed;
  background: #fff;
  border: 1px solid #d3d1c7;
  border-radius: 12px;
  padding: 13px 16px;
  font-size: 12px;
  max-width: 260px;
  pointer-events: none;
  display: none;
  z-index: 999;
  line-height: 1.6;
}
.tooltip-brand {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
}
.tooltip-series {
  font-size: 12px;
  color: #5f5e5a;
  margin-bottom: 8px;
}
.tooltip-hr { border: none; border-top: 0.5px solid #d3d1c7; margin: 8px 0; }
.tooltip-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
.tooltip-key { color: #888780; }
.tooltip-val { font-weight: 500; text-align: right; }
.tooltip-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 3px; }
.ttag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 400;
}
.size-note {
  font-size: 11px;
  color: #888780;
  margin-top: 6px;
  text-align: right;
  max-width: 1000px;
}

const allBrands = [...new Set(products.map(p => p.brand))];
let activeBrands = new Set(allBrands);

const filterRow = document.getElementById('filterRow');
const plot = document.getElementById('plotArea');
const legend = document.getElementById('legend');
const tip = document.getElementById('tooltip');

function addFilter(label, onClick, isAll) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (isAll ? ' active' : '');
  btn.textContent = label;
  if (!isAll) {
    const c = brandColors[label];
    if (c) btn.style.borderColor = c.border;
  }
  btn.addEventListener('click', onClick);
  filterRow.appendChild(btn);
  return btn;
}

// All button
const allBtn = addFilter('전체 보기', () => {
  activeBrands = new Set(allBrands);
  document.querySelectorAll('.filter-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
    b.style.background = i === 0 ? '#444441' : '';
    b.style.color = i === 0 ? '#fff' : '';
  });
  render();
}, true);
allBtn.style.background = '#444441';
allBtn.style.color = '#fff';

// Per brand buttons
allBrands.forEach(brand => {
  const c = brandColors[brand];
  const btn = addFilter(brand, () => {
    activeBrands = new Set([brand]);
    document.querySelectorAll('.filter-btn').forEach((b, i) => {
      const isThis = b.textContent === brand;
      b.classList.toggle('active', isThis);
      b.style.background = isThis ? c.border : '';
      b.style.color = isThis ? '#fff' : '';
      if (i === 0) { b.classList.remove('active'); b.style.background = ''; b.style.color = ''; }
    });
    render();
  }, false);
});

function getSize(n) {
  return Math.round(36 + Math.sqrt(n) * 16);
}

function render() {
  plot.querySelectorAll('.bubble').forEach(b => b.remove());

  const visible = products.filter(p => activeBrands.has(p.brand));

  visible.forEach(p => {
    const c = brandColors[p.brand];
    const size = getSize(p.size);

    const el = document.createElement('div');
    el.className = 'bubble';
    el.style.cssText = `
      left: ${p.x}%;
      top: ${100 - p.y}%;
      width: ${size}px;
      height: ${size}px;
      background: ${c.bg};
      border-color: ${c.border};
    `;

    const lbl = document.createElement('div');
    lbl.className = 'bubble-label';
    lbl.style.color = c.text;
    lbl.style.fontSize = Math.max(9, Math.min(12, size / 5.5)) + 'px';
    const shortName = p.series.split(' (')[0].replace(p.brand, '').trim();
    lbl.textContent = shortName.length > 12 ? shortName.slice(0, 11) + '…' : shortName;
    el.appendChild(lbl);

    el.addEventListener('mouseenter', e => {
      tip.style.display = 'block';
      const tagsHtml = p.tags.map(t => `<span class="ttag" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${t}</span>`).join('');
      tip.innerHTML = `
        <div class="tooltip-brand" style="color:${c.border}">${p.brand}</div>
        <div class="tooltip-series">${p.series}</div>
        <div class="tooltip-hr"></div>
        <div class="tooltip-row"><span class="tooltip-key">제품유형</span><span class="tooltip-val">${p.type}</span></div>
        <div class="tooltip-row"><span class="tooltip-key">가격대</span><span class="tooltip-val">${p.tier}</span></div>
        <div class="tooltip-row"><span class="tooltip-key">월 렌탈</span><span class="tooltip-val">${p.rental}</span></div>
        <div class="tooltip-row"><span class="tooltip-key">일시불</span><span class="tooltip-val">${p.lump}</span></div>
        <div class="tooltip-row"><span class="tooltip-key">SKU 수</span><span class="tooltip-val">${p.size}종</span></div>
        <div class="tooltip-hr"></div>
        <div style="font-size:11px;color:#5f5e5a;margin-bottom:7px;">${p.features}</div>
        <div class="tooltip-tags">${tagsHtml}</div>`;
      positionTip(e);
    });
    el.addEventListener('mousemove', positionTip);
    el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

    plot.appendChild(el);
  });
}

function positionTip(e) {
  const tw = 270, th = 220;
  let lx = e.clientX + 16;
  let ty = e.clientY - 10;
  if (lx + tw > window.innerWidth) lx = e.clientX - tw - 10;
  if (ty + th > window.innerHeight) ty = e.clientY - th - 10;
  tip.style.left = lx + 'px';
  tip.style.top = ty + 'px';
}

// Legend
allBrands.forEach(brand => {
  const c = brandColors[brand];
  const count = products.filter(p => p.brand === brand).length;
  legend.innerHTML += `
    <div class="legend-item">
      <span class="legend-dot" style="background:${c.bg};border-color:${c.border}"></span>
      <span style="font-weight:500;color:${c.text}">${brand}</span>
      <span style="color:#888780;font-size:11px">${count}개 제품군</span>
    </div>`;
});

render();
